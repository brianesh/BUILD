.sp-wrap { padding-top: 52px; min-height: 100vh; background: #F5F2EC; }
.sp-sidebar { width: 240px; background: #002147; min-height: calc(100vh - 52px); position: fixed; top: 52px; left: 0; bottom: 0; overflow-y: auto; display: flex; flex-direction: column; }
.sp-sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
.sp-sidebar-logo h3 { font-family: Fraunces, serif; font-size: 16px; font-weight: 700; color: #fff; }
.sp-sidebar-logo p { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 3px; }
.sp-nav { padding: 12px 0; flex: 1; }
.sp-nav-sec { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.3); padding: 12px 20px 5px; }
.sp-nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .18s; border: none; background: none; width: 100%; text-align: left; font-family: 'Plus Jakarta Sans', sans-serif; }
.sp-nav-item:hover, .sp-nav-item.act { background: rgba(255,255,255,.1); color: #fff; }
.sp-nav-item.act { border-left: 3px solid #D4A017; }
.sp-nav-item .ico { font-size: 16px; flex-shrink: 0; }
.sp-main { margin-left: 240px; padding: 28px 36px; }
.sp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.sp-header h1 { font-family: Fraunces, serif; font-size: 26px; font-weight: 700; color: #002147; }
.sp-header p { font-size: 13px; color: #7A7060; margin-top: 3px; }
.sp-stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
.sp-stat { background: #fff; border: 1px solid #E5DFD0; border-radius: 6px; padding: 18px; box-shadow: 0 2px 12px rgba(0,33,71,.06); }
.sp-stat .num { font-family: Fraunces, serif; font-size: 28px; font-weight: 700; color: #002147; }
.sp-stat .lbl { font-size: 11px; color: #7A7060; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
.sp-stat .icon { font-size: 24px; margin-bottom: 8px; }
.sp-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; margin-bottom: 24px; }
.sp-card { background: #fff; border: 1px solid #E5DFD0; border-radius: 8px; padding: 22px; box-shadow: 0 2px 12px rgba(0,33,71,.06); }
.sp-card h3 { font-family: Fraunces, serif; font-size: 17px; font-weight: 700; color: #002147; margin-bottom: 14px; }
.sp-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.sp-table th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; background: #002147; }
.sp-table td { padding: 8px 12px; border-bottom: 1px solid #E5DFD0; color: #3D3A30; }
.sp-table tr:nth-child(even) td { background: #F5F2EC; }
.sp-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 2px; }
.sp-badge.a { background: #15803d; color: #fff; }
.sp-badge.b { background: #002147; color: #fff; }
.sp-badge.c { background: #92400e; color: #fff; }
.sp-notice { background: linear-gradient(135deg,#002147,#003580); border-radius: 6px; padding: 14px 16px; color: #fff; margin-bottom: 8px; }
.sp-notice .nt { font-size: 10px; font-weight: 700; color: rgba(212,160,23,.8); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.sp-notice p { font-size: 12.5px; color: rgba(255,255,255,.8); line-height: 1.5; }
/* Hide Login Portals */
#root .sp-login, #root .pp-login, #root .sfp-login { display: none !important; }
.sp-login { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); padding: 24px; }
.sp-login-box { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 16px 60px rgba(0,33,71,.15); }
.sp-login-box h2 { font-family: Fraunces, serif; font-size: 24px; font-weight: 700; color: #002147; margin-bottom: 6px; }
.sp-login-box p { font-size: 13px; color: #7A7060; margin-bottom: 28px; }
.sp-input { width: 100%; border: 1.5px solid #E5DFD0; border-radius: 4px; padding: 11px 14px; font-size: 14px; outline: none; transition: border-color .2s; margin-bottom: 14px; font-family: 'Plus Jakarta Sans', sans-serif; }
.sp-input:focus { border-color: #002147; }
.sp-login-btn { width: 100%; background: #002147; color: #fff; border: none; padding: 13px; border-radius: 4px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-family: 'Plus Jakarta Sans', sans-serif; }
.sp-login-btn:hover { background: #003580; }
.sp-err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 12px; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; }
.resource-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.resource-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #F5F2EC; border: 1px solid #E5DFD0; border-radius: 5px; cursor: pointer; transition: all .18s; }
.resource-item:hover { background: #fff; border-color: #002147; }
.resource-item .ric { font-size: 20px; flex-shrink: 0; }
.resource-item .rn { font-size: 13px; font-weight: 600; color: #002147; }
.resource-item .rs { font-size: 11px; color: #7A7060; margin-top: 2px; }

.pp-wrap { padding-top: 52px; min-height: 100vh; background: #F5F2EC; }
.pp-sidebar { width: 240px; background: #7a4f00; min-height: calc(100vh - 52px); position: fixed; top: 52px; left: 0; bottom: 0; overflow-y: auto; display: flex; flex-direction: column; }
.pp-sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
.pp-sidebar-logo h3 { font-family: Fraunces,serif; font-size: 16px; font-weight: 700; color: #fff; }
.pp-sidebar-logo p { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 3px; }
.pp-nav { padding: 12px 0; flex: 1; }
.pp-nav-sec { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.3); padding: 12px 20px 5px; }
.pp-nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .18s; border: none; background: none; width: 100%; text-align: left; font-family: 'Plus Jakarta Sans',sans-serif; }
.pp-nav-item:hover,.pp-nav-item.act { background: rgba(255,255,255,.12); color: #fff; }
.pp-nav-item.act { border-left: 3px solid #D4A017; }
.pp-main { margin-left: 240px; padding: 28px 36px; }
.pp-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.pp-hdr h1 { font-family: Fraunces,serif; font-size: 26px; font-weight: 700; color: #002147; }
.pp-hdr p { font-size: 13px; color: #7A7060; margin-top: 3px; }
.pp-stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
.pp-stat { background: #fff; border: 1px solid #E5DFD0; border-radius: 6px; padding: 18px; box-shadow: 0 2px 12px rgba(0,33,71,.06); }
.pp-card { background: #fff; border: 1px solid #E5DFD0; border-radius: 8px; padding: 22px; box-shadow: 0 2px 12px rgba(0,33,71,.06); margin-bottom: 20px; }
.pp-card h3 { font-family: Fraunces,serif; font-size: 17px; font-weight: 700; color: #002147; margin-bottom: 14px; }
.pp-tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.pp-tbl th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; background: #7a4f00; }
.pp-tbl td { padding: 8px 12px; border-bottom: 1px solid #E5DFD0; color: #3D3A30; }
.pp-tbl tr:nth-child(even) td { background: #F5F2EC; }
.pp-login { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); padding: 24px; }
.pp-login-box { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 16px 60px rgba(0,33,71,.15); }
.pp-input { width: 100%; border: 1.5px solid #E5DFD0; border-radius: 4px; padding: 11px 14px; font-size: 14px; outline: none; transition: border-color .2s; margin-bottom: 14px; font-family: 'Plus Jakarta Sans',sans-serif; }
.pp-input:focus { border-color: #7a4f00; }
.pp-login-btn { width: 100%; background: #7a4f00; color: #fff; border: none; padding: 13px; border-radius: 4px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-family: 'Plus Jakarta Sans',sans-serif; }
.pp-login-btn:hover { background: #a06800; }
.pp-err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 12px; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; }
.pp-g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.pp-alert { padding: 14px 16px; border-radius: 6px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
.pp-alert.warn { background: #fffbeb; border: 1px solid #fde68a; }
.pp-alert.ok   { background: #f0fdf4; border: 1px solid #bbf7d0; }
.pp-alert.info { background: #eff6ff; border: 1px solid #bfdbfe; }
.pp-alert .aico { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

.sfp-wrap { padding-top: 52px; min-height: 100vh; background: #F0F7F0; }

.sfp-main { margin-left: 240px; padding: 28px 36px; }
.sfp-header { margin-bottom: 28px; }
.sfp-header h1 { font-family: Fraunces, serif; font-size: 26px; font-weight: 700; color: #155724; }
.sfp-header p { font-size: 13px; color: #7A7060; margin-top: 3px; }
.sfp-stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.sfp-stat { background: #fff; border: 1px solid #d4edda; border-radius: 6px; padding: 18px; box-shadow: 0 2px 12px rgba(21,87,36,.07); }
.sfp-stat .num { font-family: Fraunces, serif; font-size: 26px; font-weight: 700; color: #155724; }
.sfp-stat .lbl { font-size: 11px; color: #7A7060; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
.sfp-card { background: #fff; border: 1px solid #d4edda; border-radius: 8px; padding: 22px; box-shadow: 0 2px 12px rgba(21,87,36,.06); margin-bottom: 20px; }
.sfp-card h3 { font-family: Fraunces, serif; font-size: 17px; font-weight: 700; color: #155724; margin-bottom: 14px; }
.sfp-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.sfp-table th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; background: #155724; }
.sfp-table td { padding: 8px 12px; border-bottom: 1px solid #d4edda; color: #3D3A30; }
.sfp-table tr:nth-child(even) td { background: #F0F7F0; }
.sfp-login { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); padding: 24px; background: #F0F7F0; }
.sfp-login-box { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 16px 60px rgba(21,87,36,.15); }
.sfp-input { width: 100%; border: 1.5px solid #d4edda; border-radius: 4px; padding: 11px 14px; font-size: 14px; outline: none; transition: border-color .2s; margin-bottom: 14px; font-family: 'Plus Jakarta Sans', sans-serif; }
.sfp-input:focus { border-color: #155724; }
.sfp-login-btn { width: 100%; background: #155724; color: #fff; border: none; padding: 13px; border-radius: 4px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-family: 'Plus Jakarta Sans', sans-serif; }
.sfp-login-btn:hover { background: #0d3d18; }
.sfp-err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; font-size: 12px; padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; }
.doc-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #F0F7F0; border: 1px solid #d4edda; border-radius: 5px; margin-bottom: 8px; cursor: pointer; transition: all .18s; }
.doc-item:hover { background: #fff; border-color: #155724; }
.doc-item .di { font-size: 20px; flex-shrink: 0; }
.doc-item .dn { font-size: 13px; font-weight: 600; color: #155724; }
.doc-item .ds { font-size: 11px; color: #7A7060; margin-top: 2px; }
